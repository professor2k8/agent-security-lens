name: Bug report
description: Report reproducible MCP, CLI or decision-contract behavior.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Do not include secrets, private code, tokens, cookies or exploitable vulnerability details.
  - type: input
    id: version
    attributes:
      label: ASL version
      placeholder: 0.1.0
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - MCP server
        - CLI assessment
        - Decision contract
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Use public or synthetic component metadata only.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
